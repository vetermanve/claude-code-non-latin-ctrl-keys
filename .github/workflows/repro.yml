name: repro

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  repro:
    name: broken-vs-fixed parser repro (6 cases)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run repro
        run: node repro/repro-ru-ctrl-c.mjs
